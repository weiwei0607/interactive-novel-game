<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#020617" />
    <meta name="description" content="Truth in the Mist - Interactive mystery visual novel. Choose your character, explore scenes, and find the culprit." />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Truth in the Mist | Interactive Mystery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <style>
      html, body { background: #020617; margin: 0; padding: 0; }
      #splash {
        position: fixed; inset: 0; z-index: 9999;
        background: #020617;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        transition: opacity 0.5s ease-out;
      }
      #splash.hidden { opacity: 0; pointer-events: none; }
      #splash-icon {
        width: 64px; height: 64px;
        border: 3px solid rgba(245, 158, 11, 0.15);
        border-top-color: rgba(245, 158, 11, 0.8);
        border-radius: 50%;
        animation: splashSpin 1s linear infinite;
        margin-bottom: 20px;
      }
      #splash-title {
        color: #f5f5f4; font-size: 24px; font-weight: 700;
        letter-spacing: 0.1em; margin-bottom: 8px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", sans-serif;
      }
      #splash-sub {
        color: #78716c; font-size: 12px;
        letter-spacing: 0.15em;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", sans-serif;
      }
      @keyframes splashSpin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <div id="splash-icon"></div>
      <div id="splash-title">霧中真相</div>
      <div id="splash-sub">INTERACTIVE MYSTERY</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (function() {
        var splash = document.getElementById('splash');
        function hide() {
          if (splash) { splash.classList.add('hidden'); setTimeout(function() { splash.remove(); }, 500); }
        }
        if (document.readyState === 'complete') { hide(); }
        else { window.addEventListener('load', hide); }
        setTimeout(hide, 3000);
      })();
    </script>
  </body>
</html>
